services:
  - type: web
    name: empetur-api
    runtime: python
    plan: free
    region: ohio
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMPETUR_CORS_ORIGINS
        value: "*"
